# To install Tmux Plugin Manager:
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
#
# ### Key bindings
#
# `prefix` + <kbd>I</kbd>
# - Installs new plugins from GitHub or any other git repository
# - Refreshes TMUX environment
#
# `prefix` + <kbd>U</kbd>
# - updates plugin(s)
#
# `prefix` + <kbd>alt</kbd> + <kbd>u</kbd>
# - remove/uninstall plugins not on the plugin list
set -g @plugin 'tmux-plugins/tpm'
# use prefix-Tab to insert a word from a tmux buffer
set -g @plugin 'laktak/extrakto'
# Claude/Codex agent state via window-title colors and pane borders
set -g @plugin 'accessd/tmux-agent-indicator'

# Set prefix to space.
unbind-key C-b
set-option -g prefix C-Space
# Bell passthrough: forward BEL (\a) from panes to the outer terminal so Ghostty
# can play its bell sound and bounce the dock. monitor-bell tracks bells in
# background windows; visual-bell off keeps the bell audible (vs. tmux popup).
set -g bell-action any
setw -g monitor-bell on
set -g visual-bell off

# Use vi keybindings for tmux commandline input.
# Note that to get command mode you need to hit ESC twice...
set -g status-keys vi

# Use vi keybindings in copy and choice modes
setw -g mode-keys vi

# No escape time for vi mode
set -sg escape-time 0

# show messages for 4 seconds instead
set -g display-time 1000

# set first window to index 1 (not 0) to map more to the keyboard layout
set-option -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1

# Scroll History
set -g history-limit 300000

# Set ability to capture on start and restore on exit window data when running an application
setw -g alternate-screen on

# Slightly more useful width in "main-vertical" layout; enough room for 3-digit
# line number gutter in Vim + 80 columns of text + 1 column breathing room
# (default looks to be about 79).
set-option -w -g main-pane-width 85

# iterm
# set-option -g default-terminal "xterm-256color"
# wezterm
# set-option -g default-terminal "tmux-256color"
# set-option -ga terminal-overrides ',xterm-256color:RGB'
# set -ga terminal-overrides ",*256col*:Tc"
# ghostty
set-option -sa terminal-overrides ",xterm-ghostty:RGB"
set-option -sa terminal-overrides ",xterm-256color:RGB"

# set-option -ga terminal-overrides ',wezterm:Tc'

# other
## set-option -ga terminal-overrides ',xterm-256color:Tc'
set-option -g default-terminal "tmux-256color"

# set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'

# Start window and pane numbering at 1, (0 is too hard to reach).
set-option -g base-index 1
set-option -g pane-base-index 1

# Don't wait for an escape sequence after seeing C-Space.
set-option -s escape-time 0

# Dynamically update iTerm tab and window titles.
set-option -g set-titles on

# Needed as on tmux 1.9 and up (defaults to off).
# Added in tmux commit c7a121cfc0137c907b7bfb.
set-option -g focus-events on

# But don't change tmux's own window titles.
set-option -w -g automatic-rename off

# Don't wrap searches; it's super confusing given tmux's reverse-ordering of
# position info in copy mode.
set-option -w -g wrap-search off

# - #S = session name
# - #T = pane title (~/.zshrc sets this to the last/current command)
set-option -g set-titles-string "#S > #T"

# Show bells in window titles. Use attributes only so we don't override the
# fg/bg coming from window-status-style (e.g. tmux-agent-indicator state colors).
set-option -g window-status-bell-style bold,underscore

# Turn off distracting border highlight.
set-option -ga pane-active-border-style bg=default,fg=default

# Add : to the default list (" -_@") of word separators.
set-option -ga word-separators :/

# Make sure we always start at 1, even when invoked from a .tmux wrapper script.
set-environment -g SHLVL 1

# For those times when C-c and q are not enough.
bind-key -T copy-mode-vi Escape send-keys -X cancel

# Fast toggle between current and last-used window (normally prefix-l).
bind-key ^space last-window

# `^space ^space` is awfully close to the destructive `^space space`, which
# trashes the layout. Providea quick way to get back to the previous-used
# layout.
#
# Normally used for previous-window, but I never use that, prefering numeric
# access.
bind-key p select-layout -o

# Create splits and vertical splits
bind-key v split-window -h -c "#{pane_current_path}"
bind-key ^V split-window -h -c "#{pane_current_path}"
bind-key s split-window -c "#{pane_current_path}"
bind-key ^S split-window -c "#{pane_current_path}"

# Arrange Chrome and Ghostty windows across external displays (macOS only:
# the script drives AppleScript, so the bind is not defined elsewhere).
if-shell -b 'uname | grep -q Darwin' \
    "bind-key a run-shell '~/bin/arrange-displays-tmux.sh'"

# Pane resize in all four directions using vi bindings.
# Can use these raw but I map them to shift-ctrl-<h,j,k,l> in iTerm.
bind -r H resize-pane -L 15
bind -r J resize-pane -D 15
bind -r K resize-pane -U 15
bind -r L resize-pane -R 17

bind-key h select-pane -L
bind-key l select-pane -R
bind-key k select-pane -U
bind-key j select-pane -D

bind-key S list-sessions

# nvim-tmux-navigation
# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l


# easily toggle synchronization (mnemonic: e is for echo)
# sends input to all panes in a given window.
bind e setw synchronize-panes on
bind E setw synchronize-panes off

# set first window to index 1 (not 0) to map more to the keyboard layout...
set-option -g base-index 1
set-window-option -g pane-base-index 1

# Solarized Light palette:
# base3 (bright bg): #fdf6e3
# base00 (text):     #657b83
# blue (accent):     #268bd2

set -g status-left-length 52
set -g status-right-length 451
set -g status-fg "#657b83"
set -g status-bg "#fdf6e3"
set -g message-style 'fg=#fdf6e3,bg=#268bd2'
set -g message-command-style 'fg=#268bd2,bg=#fdf6e3'

set -g status-left '#[fg=#268bd2,bg=#fdf6e3] ❐ #S #[fg=#fdf6e3,bg=#268bd2]#[fg=#fdf6e3,bg=#268bd2] #(whoami) #[fg=#268bd2,bg=#fdf6e3]'
# Window list: format strings carry no color so window-status-style controls them
# (lets tmux-agent-indicator override per-window when an agent needs attention).
set -g window-status-format " #I #W "
set -g window-status-style "fg=#657b83,bg=#fdf6e3"
set -g window-status-current-format " #I #W "
set -g window-status-current-style "fg=#fdf6e3,bg=#657b83"

# tmux-agent-indicator: solarized-friendly window title colors per state.
# Only override needs-input and done; running stays default (no color shift).
set -g @agent-indicator-needs-input-window-title-bg "#d33682"  # solarized magenta
set -g @agent-indicator-needs-input-window-title-fg "#fdf6e3"  # solarized base3
set -g @agent-indicator-done-window-title-bg "#859900"         # solarized green
set -g @agent-indicator-done-window-title-fg "#fdf6e3"
# Suppress per-state status-line popups; window color is enough.
set -g @agent-indicator-notification-enabled "off"

# BEGIN of MOUSE & CLIP CONFIG

# Make mouse useful, tmux > 2.1 include select, resize pane/window and console wheel scroll
set -g mouse on

# Selection with mouse should copy to clipboard right away, in addition to the default action.
# unbind -n -Tcopy-mode-vi MouseDragEnd1Pane
# bind -Tcopy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel\; run "tmux save-buffer - | nc -U ~/clipper.sock"
unbind-key -T copy-mode-vi MouseDragEnd1Pane

# Middle click to paste from the clipboard
# unbind-key MouseDown2Pane
# bind-key -n MouseDown2Pane run "tmux set-buffer \"$(xclip -o -sel clipboard)\"; tmux paste-buffer"

# Drag to re-order windows
bind-key -n MouseDrag1Status swap-window -t=

# Double click on the window list to open a new window
bind-key -n DoubleClick1Status new-window

# END of MOUSE & CLIP CONFIG

# New windows/pane in $PWD
bind c new-window -c "#{pane_current_path}"

# Launch lazygit
# setting TERM variable as a workaround for a termbox bug:
# https://github.com/jesseduffield/lazygit/issues/1066
bind g new-window -n 'lazygit' -c "#{pane_current_path}" 'TERM=xterm-256color lazygit'
bind u new-window -n 'jjui' -c "#{pane_current_path}" 'TERM=wezterm jjui'

# bind y run-shell '
#   tmux capture-pane -p -J | \
#   grep -oE "https?://[^ ]+" | \
#   tail -1 | \
#   xargs -I{} ~/.clipcast/bin/open -na "Google Chrome" --args --profile-directory="Profile 2" "{}"
# '
# bind y run-shell 'bash -c "
#   url=\$(tmux capture-pane -p -J | grep -oE \"https://[^ ]+\" | tail -1 | tr -d \"\r\") && \
#   [ -n \"\$url\" ] && \
#   open -na \"Google Chrome\" --args --profile-directory=\"Profile 2\" \"\$url\"
# " &'

# ~/.tmux.conf
bind y run-shell 'bash -c "
  tmux display \"opening...\" && \
  export RUST_LOG=info && \
  mkdir -p ~/.clipcast/logs && \
  log=~/.clipcast/logs/open-log.txt && \
  tail -n 1000 \"\$log\" > \"\$log.tmp\" && mv \"\$log.tmp\" \"\$log\" && \
  echo \"--- \$(date) ---\" >> \$log && \
  url=\$(tmux capture-pane -p -J 2>>\$log | grep -oE \"https://[^ ]+\" | tail -1 | tr -d \"\r\") && \
  tmux display \"opening: \$url\" && \
  echo \"url: [\$url]\" >> \$log && \
  [ -n \"\$url\" ] && \
  ~/.clipcast/bin/open -na \"Google Chrome\" --args --profile-directory=\"Profile 2\" \"\$url\" >> \$log 2>&1 || \
  echo \"open failed or no url\" >> \$log
" &'

# Leave only current pane
bind o kill-pane -a


# force a reload of the config file
unbind r
bind r source-file ~/.tmux.conf \; display "reloaded!"

# COPY & PASTE

# if-shell '[[ $(uname -s) = Linux ]]' {
if-shell '/bin/bash -c '"'"'[[ $(uname -s) = Linux ]]'"'"'' {
    # bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
    bind C-c run "tmux save-buffer - | xclip -i -sel clipboard && tmux display 'copied!'"
    # ctrl+v to paste from clipboard
    bind C-v run "tmux set-buffer \"$(xclip -o -sel clipboard)\"; tmux paste-buffer"
} {  
    # bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
    bind C-c run "tmux save-buffer - | pbcopy && tmux display 'copied!'"
    bind C-v run "tmux set-buffer \"$(pbpaste)\"; tmux paste-buffer"
    bind C-p run "tmux save-buffer - | pastebin | xargs browse.sh && tmux display 'Pastebinned!'"
}

if-shell '/bin/bash -c '"'"'[[ $(uname -s) = Linux ]]'"'"'' {
    # Clipper.
    # bind-key y run-shell "tmux save-buffer - | nc -N -U ~/.clipper.sock && tmux display 'copied!'"
    # "copy-pipe" requires tmux >= 1.8
    bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "nc -N -U ~/.clipper.sock"
} {
    # Clipper.
    # bind-key y run-shell "tmux save-buffer - | nc -U ~/.clipper.sock"
    # "copy-pipe" requires tmux >= 1.8
    bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "nc -U ~/.clipper.sock"
}


# Search back to last prompt (mnemonic: "[b]ack").
bind-key b copy-mode\; send-keys -X start-of-line\; send-keys -X search-backward "❯"\; send-keys -X next-word

bind-key -T copy-mode-vi / command-prompt -i -p "search down" "send -X search-forward-incremental \"%%%\""
bind-key -T copy-mode-vi ? command-prompt -i -p "search up" "send -X search-backward-incremental \"%%%\""

# Analagous with naked C-l which resets/clears the terminal.
bind-key C-l clear-history

# allow inline images (tmux >= 3.3)
if-shell -b '[ "$(printf "%s\n3.3\n" "$(tmux -V | cut -d" " -f2)" | sort -V | head -n1)" = "3.3" ]' \
    'set -g allow-passthrough on'
# Headless host: DISPLAY=:99 (Xvfb) is a permanent machine fact, not a per-client value,
# so omit DISPLAY from update-environment — otherwise a client attach without DISPLAY
# scrubs it at the session level and xclip breaks with "Can't open display".
set -g update-environment "KRB5CCNAME MSYSTEM SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY"
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Opens selection
# o - opens file with default program
# C-o - opens in $EDITOR
# Shift-s - search in Google
# run-shell ~/dotfiles/tmux/plugins/tmux-open/open.tmux

source-file -q ~/.tmux-local.conf
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
