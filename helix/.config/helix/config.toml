theme="solarized_light"

[editor]
auto-save = true
line-number = "relative"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.statusline]
right = ["diagnostics", "selections", "position", "total-line-numbers", "file-encoding"]

[keys.normal]
C-s = ":wa"
# g = { a = "code_action" }
"*" = ["move_prev_word_start", "move_next_word_end", "search_selection", "search_next"]
# "*" = ["move_prev_word_start", "move_next_word_end", "search_selection", "global_search"]
"#" = ["move_prev_word_start", "move_next_word_end", "search_selection", "search_prev"]
C-f = [
    ":new",
    ":insert-output lf-pick",
    "split_selection_on_newline",
    "goto_file",
    "goto_last_modification",
    "goto_last_modified_file",
    ":buffer-close!",
    ":redraw"
]
